<!DOCTYPE html>
<html>

<head>
  <title>Celebrity Booking Website</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

  <header>
    <nav>
      <div class="nav-links">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </div>
      <div class="hamburger">
        <i class="fa fa-bars"></i>
      </div>
    </nav>
  </header>

  <section id="hero">
  </section>
  <main>
    <section id="booking-form">
      <h2>Request a Booking</h2>
      <form id="bookingform" action="https://formsubmit.io/send/ec45eae4-ac2d-4398-bc60-8a51617f7ea5" method="POST">
        <input name="_redirect" type="hidden" id="name" value="https://mycelebrityonlinebookings.netlify.app/success.html">
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone:</label>
          <input type="tel" id="phone" name="phone" required>
        </div>
        <div class="form-group">
          <label for="celebrity">Celebrity:</label>
          <input type="text" id="celebrity" name="celebrity" required>
        </div>
        <div class="form-group">
          <label for="nationality">Nationality:</label>
          <input type="text" id="nationality" name="Nationality" required>
        </div>
        <div class="form-group">
          <label for="message">Message:</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <div class="form-group">
          <label for="date">Date:</label>
          <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
          <label for="budget">Budget:</label>
          <input type="text" id="budget" name="budget" value="$" required>
        </div>
        <div class="form-group">
          <label for="home-address">Contact Home Address:</label>
          <input type="text" id="home-address" name="Home-address" required>
        </div>
        <button type="submit" id="btn">Submit</button>
      </form>
    </section>
  </main>
  <footer>
    <p>Copyright © 2017 Celebrity Booking</p>
  </footer>

  <script src="app.js"></script>
</body>

</html>
